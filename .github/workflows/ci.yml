name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  mod-tidy:
    name: Go Mod Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Go mod tidy
        run: go mod tidy
      - name: Verify no changes
        run: git diff --exit-code go.mod go.sum

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [mod-tidy]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go1.25-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go1.25-
      - name: Download dependencies
        run: go mod download
      - name: Run go vet
        run: go vet ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [mod-tidy]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go1.25-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go1.25-
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -race -count=1 -shuffle=on -vet=all -timeout=15m -coverprofile=coverage.out ./...
      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

  docker:
    name: Docker Build
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build
    needs: [test, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build mtgsim
        run: go build -v -o mtgsim${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/mtgsim
      - name: Build mtgsim-dashboard
        run: go build -v -o mtgsim-dashboard${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/mtgsim-dashboard
      - name: Build mtgsim-edh
        run: go build -v -o mtgsim-edh${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/mtgsim-edh
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mtgsim-${{ matrix.os }}
          path: |
            mtgsim*
            mtgsim-dashboard*
            mtgsim-edh*
          if-no-files-found: error

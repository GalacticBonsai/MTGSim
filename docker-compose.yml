# MTGSim production deployment
#
# Architecture:
#   Caddy (internet-facing) → API (internal) → PostgreSQL (private)
#                                                   ↑
#                                           Runner workers
#
# PostgreSQL uses `expose` (not `ports`) so it is never reachable
# from outside the Docker network.
#
# Set MTGSIM_AUTH_TOKEN to a secret value before deploying:
#   echo "MTGSIM_AUTH_TOKEN=$(openssl rand -hex 32)" > .env
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: mtgsim
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mtgsim}
      POSTGRES_DB: mtgsim
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtgsim"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build: .
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      MTGSIM_AUTH_TOKEN: ${MTGSIM_AUTH_TOKEN:-}
    command:
      - mtgsim-edh
      - -db=postgres://mtgsim:${POSTGRES_PASSWORD:-mtgsim}@postgres:5432/mtgsim?sslmode=disable
      - -decks=/app/decks
      - -pod=4
      - -max-turns=50
      - -port=8080
      - -card-stats=/data/card_library.json
    volumes:
      - ./decks:/app/decks:ro
      - ./.cache:/app/.cache
      - mtgsim-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  runner:
    build: .
    restart: unless-stopped
    environment:
      MTGSIM_AUTH_TOKEN: ${MTGSIM_AUTH_TOKEN:-}
    command:
      - mtgsim-edh
      - -worker
      - -db=postgres://mtgsim:${POSTGRES_PASSWORD:-mtgsim}@postgres:5432/mtgsim?sslmode=disable
      - -decks=/app/decks
      - -pod=4
      - -max-turns=50
      - -card-stats=/data/card_library.json
    volumes:
      - ./decks:/app/decks:ro
      - ./.cache:/app/.cache
      - mtgsim-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pg-data:
  mtgsim-data:
  caddy-data:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mtgsim
      POSTGRES_PASSWORD: mtgsim
      POSTGRES_DB: mtgsim
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtgsim"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  edh-runner:
    build: .
    command:
      - mtgsim-edh
      - -db=postgres://mtgsim:mtgsim@postgres:5432/mtgsim?sslmode=disable
      - -decks=/app/decks
      - -games=1000
      - -pod=4
      - -max-turns=50
      - -port=0
      - -card-stats=/data/card_library.json
    volumes:
      - ./decks:/app/decks:ro
      - ./.cache:/app/.cache
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: .
    command:
      - mtgsim-dashboard
      - -db=postgres://mtgsim:mtgsim@postgres:5432/mtgsim?sslmode=disable
      - -decks=/app/decks
      - -port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./decks:/app/decks:ro
      - ./.cache:/app/.cache
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg-data:
